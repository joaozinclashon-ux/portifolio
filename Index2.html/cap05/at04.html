<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT04 — Inscrição em Evento</title>
</head>
<body>

  <header>
    <h1>AT04 — Inscrisão em Evento</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>

    <style>
  /* 1. CONFIGURAÇÃO DA PÁGINA (BACKGROUND E FONTE) */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    color: #333;
    line-height: 1.6;
    margin: 0;
    padding: 20px;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
  }

  header a {
    color: #007bff;
    text-decoration: none;
    font-weight: bold;
  }

  header a:hover {
    text-decoration: underline;
  }

  /* 2. O CONTAINER CENTRALIZADO DO FORMULÁRIO */
  main {
    max-width: 600px;
    margin: 0 auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  /* 3. CAIXAS DE AGRUPAMENTO (FIELDSET E LEGEND) */
  fieldset {
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 25px;
    background-color: #fafafa;
  }

  legend {
    font-weight: bold;
    color: #007bff;
    padding: 0 10px;
    font-size: 1.1rem;
  }

  /* Espaçamento vertical entre os campos */
  div {
    margin-bottom: 15px;
  }

  /* 4. RÓTULOS (LABELS) */
  label {
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
    font-size: 0.95rem;
  }

  /* Exceção importante: Labels de Radio e Checkbox não devem quebrar linha */
  input[type="radio"] + label,
  input[type="checkbox"] + label {
    display: inline;
    font-weight: normal;
    margin-left: 5px;
  }

  /* 5. CAMPOS DE DIGITAÇÃO E SELEÇÃO */
  input[type="text"],
  input[type="email"],
  input[type="password"],
  input[type="tel"],
  input[type="number"],
  input[type="url"],
  input[type="date"],
  input[type="datetime-local"],
  select,
  textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box; /* Crucial para o padding não estourar os 100% */
    font-size: 1rem;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  /* Efeito luminoso quando o usuário clica no campo */
  input:focus, select:focus, textarea:focus {
    border-color: #007bff;
    box-shadow: 0 0 5px rgba(0, 123, 255, 0.2);
    outline: none;
  }

  /* Ajustes específicos para componentes avançados (AT04) */
  input[type="color"] {
    width: 60px;
    height: 40px;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
  }

  input[type="range"] {
    width: 100%;
    margin: 10px 0;
  }

  /* 6. BOTÕES (ENVIAR E LIMPAR) */
  button {
    padding: 12px 20px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
    margin-right: 10px;
  }

  button[type="submit"] {
    background-color: #28a745;
    color: white;
  }

  button[type="submit"]:hover {
    background-color: #218838;
  }

  button[type="reset"] {
    background-color: #6c757d;
    color: white;
  }

  button[type="reset"]:hover {
    background-color: #5a6268;
  }

  button:active {
    transform: scale(0.98); /* Efeito de clique físico afundando levemente */
  }

  /* Textos auxiliares pequenos (Acessibilidade) */
  small {
    color: #666;
    font-size: 0.85rem;
    display: inline-block;
    margin-top: 4px;
  }
</style>
  </header>

  <main>
    <form action="https://httpbin.org/post" method="POST" enctype="multipart/form-data">
      
      <input type="hidden" name="edicao" value="2026" />

      <fieldset>
        <legend>Identificação do Participante</legend>

        <div>
          <label for="txt-nome">Nome completo: *</label>
          <input type="text" id="txt-nome" name="nome" required />
        </div>

        <div>
          <label for="txt-email">E-mail institucional: *</label>
          <input type="email" id="txt-email" name="email" required />
        </div>

        <div>
          <label for="txt-cidade">Cidade de origem:</label>
          <input type="text" id="txt-cidade" name="cidade" list="cidades-alagoas" />
          
          <datalist id="cidades-alagoas">
            <option value="Maceió"></option>
            <option value="Arapiraca"></option>
            <option value="Palmeira dos Índios"></option>
            <option value="Rio Largo"></option>
            <option value="Penedo"></option>
            <option value="União dos Palmares"></option>
            <option value="Delmiro Gouveia"></option>
            <option value="Santana do Ipanema"></option>
          </datalist>
        </div>

        <div>
          <label for="file-foto">Foto para crachá:</label>
          <input 
            type="file" 
            id="file-foto" 
            name="foto" 
            accept="image/jpeg,image/png" 
            aria-describedby="instrucao-foto" 
          />
          <br />
          <small id="instrucao-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>
        </div>
      </fieldset>

      <fieldset>
        <legend>Preferências para o Evento</legend>

        <div>
          <label for="date-chegada">Data e hora preferida para chegada:</label>
          <input type="datetime-local" id="date-chegada" name="chegada" />
        </div>

        <div>
          <label for="experiencia">
            Nível de experiência: <span id="valor-experiencia">5</span>/10
          </label>
          <br />
          <input
            type="range"
            id="experiencia"
            name="experiencia"
            min="0" max="10" step="1" value="5"
            oninput="document.getElementById('valor-experiencia').textContent = this.value"
          />
        </div>

        <div>
          <label for="clr-camiseta">Cor de preferência para a camiseta:</label>
          <br />
          <input type="color" id="clr-camiseta" name="cor_camiseta" value="#1a73e8" />
        </div>

        <div>
          <label for="sel-oficinas">Oficinas de interesse:</label>
          <br />
          <select 
            id="sel-oficinas" 
            name="oficinas[]" 
            multiple 
            size="4" 
            aria-describedby="instrucao-oficinas"
          >
            <option value="web">Desenvolvimento Web Avançado</option>
            <option value="dados">Ciência de Dados com Python</option>
            <option value="ux">Design de Interface e UX</option>
            <option value="seguranca">Segurança em Aplicações Cloud</option>
            <option value="mobile">Desenvolvimento Mobile Híbrido</option>
          </select>
          <br />
          <small id="instrucao-oficinas">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small>
        </div>
      </fieldset>

      <div>
        <br />
        <button type="submit">Confirmar inscrição</button>
      </div>

    </form>
  </main>

</body>
</html>
